# ==============================================================================
# Self-hosted Neo4j Community — production compose for an always-free VM
# ==============================================================================
# This replaces a managed Neo4j Aura Free instance (which pauses after a few
# days of inactivity) with a Neo4j you control that never auto-pauses.
#
# Intended target: a small always-free VM (Oracle Cloud Ampere/Always Free or a
# GCP e2-micro free-tier instance). See README.md in this folder.
#
# Usage on the VM:
#   cp neo4j.env.example neo4j.env   # then edit NEO4J_PASSWORD
#   docker compose --env-file neo4j.env up -d
#
# Memory knobs are intentionally small and overridable so this fits a 1 GB VM.
# On a larger Oracle Ampere instance you can raise them via neo4j.env.
# ==============================================================================

services:
  neo4j:
    image: neo4j:5-community
    container_name: graphrag-neo4j
    restart: always
    ports:
      - "7474:7474"   # HTTP browser UI (consider firewalling to your IP only)
      - "7687:7687"   # Bolt protocol (the app connects here)
    environment:
      # Auth: username is always "neo4j"; password comes from neo4j.env.
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in neo4j.env}"
      # APOC procedures (used by some advanced Cypher operations).
      NEO4J_PLUGINS: '["apoc"]'
      # Listen on all interfaces so the VM's public IP is reachable.
      NEO4J_server_default__listen__address: "0.0.0.0"
      # Advertise the public address so Bolt routing returns a reachable host.
      NEO4J_server_default__advertised__address: "${NEO4J_ADVERTISED_HOST:-localhost}"
      NEO4J_server_bolt_advertised__address: "${NEO4J_ADVERTISED_HOST:-localhost}:7687"
      NEO4J_server_http_advertised__address: "${NEO4J_ADVERTISED_HOST:-localhost}:7474"
      # Memory tuning (small defaults; override for bigger VMs).
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL:-512m}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX:-512m}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE:-512m}"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test:
        - "CMD-SHELL"
        - "cypher-shell -u neo4j -p \"$NEO4J_PASSWORD\" 'RETURN 1' || exit 1"
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
